<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:20px;
        }

        .chat-container{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 0 8px gray;
            width:500px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            padding:10px 18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-right:10px;
        }

        .back-btn{
            background:#16215c;
            color:white;
            margin-bottom:20px;
        }

        .action-btn{
            background:black;
            color:white;
        }

        #chatBox{
            margin-top:20px;
            background:#fafafa;
            padding:15px;
            border-radius:10px;
            min-height:150px;
            max-height:300px;
            overflow-y:auto;
        }
    </style>
</head>
<body>

<button class="back-btn" onclick="goBack()">
    ← Back to Dashboard
</button>

<div class="chat-container">

    <h2 id="chatWith">Chat</h2>

    <input id="messageInput" placeholder="Type message">

    <button class="action-btn" onclick="sendMessage()">Send</button>
    <button class="action-btn" onclick="loadMessages()">Refresh</button>

    <div id="chatBox"></div>
</div>

<script>

    const currentUserId = localStorage.getItem("loggedInUserId");
    const chatUserId = localStorage.getItem("chatUserId");
    const chatUserName = localStorage.getItem("chatUserName");

    // ✅ show name
    document.getElementById("chatWith").innerText =
        "Chat with " + chatUserName;

    // ✅ FIXED matchId (same for both users)
    const matchId =
        currentUserId < chatUserId
            ? currentUserId + "_" + chatUserId
            : chatUserId + "_" + currentUserId;

    // ✅ LOAD MESSAGES
    function loadMessages() {

        fetch(`http://localhost:8080/api/chat/${matchId}/messages?userId=${currentUserId}`)
            .then(res => res.json())
            .then(res => {

                const messages = res.data || [];
                let html = "";

                messages.forEach(msg => {

                    let sender =
                        msg.senderId == currentUserId ? "You" : chatUserName;

                    html += `<p><b>${sender}:</b> ${msg.content}</p>`;
                });

                document.getElementById("chatBox").innerHTML = html;
            })
            .catch(err => console.error(err));
    }

    // ✅ SEND MESSAGE
    function sendMessage() {

        const content = document.getElementById("messageInput").value;

        if (!content.trim()) return;

        fetch(`http://localhost:8080/api/chat/${matchId}/messages`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                senderId: currentUserId,
                content: content
            })
        })
            .then(() => {
                document.getElementById("messageInput").value = "";
                loadMessages();
            })
            .catch(err => console.error(err));
    }

    // auto load
    loadMessages();

    function goBack() {
        window.location.href = "user_dashboard.html";
    }

</script>

</body>
</html>
