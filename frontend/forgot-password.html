<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-container">

    <button class="back-btn" onclick="window.location.href='login.html'">
        Back
    </button>

    <h1>Reset Password</h1>

    <input
            type="email"
            id="resetEmail"
            placeholder="Enter your email"
            required
    >

    <button onclick="sendResetLink()">
        Send Reset Link
    </button>

    <p id="message"></p>

</div>

<script>
    async function sendResetLink() {
        const email = document.getElementById("resetEmail").value.trim();
        const message = document.getElementById("message");

        if (!email) {
            message.innerText = "Please enter your email.";
            return;
        }

        try {
            const response = await fetch("http://localhost:8080/api/auth/forgot-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email })
            });

            const result = await response.text();

            if (response.ok) {
                message.innerText = "Reset link sent successfully!";
                message.style.color = "green";
            } else {
                message.innerText = "Error: " + result;
                message.style.color = "red";
            }

        } catch (error) {
            message.innerText = "Server connection error.";
            message.style.color = "red";
            console.error(error);
        }
    }
</script>

</body>
</html>
