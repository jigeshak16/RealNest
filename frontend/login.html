<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realnest Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#2f2f2f;
            min-height:100vh;
        }

        .container{
            width:95%;
            min-height:95vh;
            margin:20px auto;
            display:flex;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .left{
            width:50%;
            background:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85') center/cover no-repeat;
            position:relative;
            color:white;
        }

        .logo{
            position:absolute;
            top:30px;
            left:30px;
            background:white;
            color:black;
            padding:12px 20px;
            border-radius:35px;
            font-size:32px;
            font-weight:bold;
        }

        .overlay-text{
            position:absolute;
            bottom:50px;
            left:50px;
        }

        .overlay-text h1{
            font-size:60px;
        }

        .overlay-text p{
            font-size:22px;
        }

        .right{
            width:50%;
            padding:60px 80px;
        }

        h1{
            font-size:55px;
            color:#16215c;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            display:block;
            margin:15px 0 8px;
            font-size:20px;
        }

        input,select{
            width:100%;
            padding:18px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:18px;
            margin-bottom:20px;
        }

        .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
            color:gray;
            font-size:18px;
        }

        .login-btn,.register-btn{
            width:100%;
            padding:18px;
            border:none;
            border-radius:10px;
            font-size:22px;
            cursor:pointer;
            margin-top:10px;
        }

        .login-btn{
            background:black;
            color:white;
        }

        .register-btn{
            background:#2563eb;
            color:white;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">🏠 Realnest</div>

        <div class="overlay-text">
            <h1>Find your sweet home</h1>
            <p>Schedule visits in just a few clicks</p>
        </div>
    </div>

    <div class="right">

        <h1>Welcome Back!</h1>
        <p>Sign in to continue</p>

        <label>Your Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">

        <label>Login As</label>
        <select id="role">
            <option value="owner">Owner</option>
            <option value="user">User</option>
        </select>

        <div class="row">
            <label>
                <input type="checkbox" id="rememberMe" style="width:auto;">
                Remember Me
            </label>

            <span onclick="forgotPassword()" style="cursor:pointer;">
                Forgot Password?
            </span>
        </div>

        <button class="login-btn" onclick="login()">Login</button>

        <button class="register-btn" onclick="goToRegister()">
            Create Account
        </button>

    </div>
</div>

<script>
    window.onload = function () {
        const savedEmail = localStorage.getItem("savedEmail");

        if (savedEmail) {
            document.getElementById("email").value = savedEmail;
            document.getElementById("rememberMe").checked = true;
        }
    };

    function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const role = document.getElementById("role").value.toLowerCase();
        const rememberMe = document.getElementById("rememberMe").checked;

        if (!email || !password) {
            alert("Please enter email and password");
            return;
        }

        const data = { email, password };

        fetch(`http://localhost:8080/api/${role}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(response => response.text())
            .then(result => {

                if (result.includes("Success")) {

                    const parts = result.split("|");
                    const userId = parts[1];

                    // ✅ MAIN FIX
                    localStorage.setItem("loggedInUserId", userId);

                    // optional backup
                    localStorage.setItem("userId", userId);

                    if (rememberMe) {
                        localStorage.setItem("savedEmail", email);
                    } else {
                        localStorage.removeItem("savedEmail");
                    }

                    alert("Login Successful");

                    if (role === "owner") {
                        window.location.href = "owner_dashboard.html";
                    } else {
                        window.location.href = "user_dashboard.html";
                    }

                } else {
                    alert(result);
                }
            })
            .catch(error => {
                console.error(error);
                alert("Login failed. Check backend.");
            });
    }

    function forgotPassword() {
        const email = prompt("Enter your registered email");

        if (!email) return;

        fetch("http://localhost:8080/api/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        })
            .then(res => res.text())
            .then(data => alert(data))
            .catch(() => alert("Failed to send reset link"));
    }

    function goToRegister() {
        window.location.href = "signup.html";
    }
</script>

</body>
</html>
